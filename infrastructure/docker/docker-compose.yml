services:
  postgres:
    image: postgres:17-alpine
    container_name: openmarket-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: openmarket
      POSTGRES_USER: openmarket
      POSTGRES_PASSWORD: openmarket_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmarket"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: openmarket-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: openmarket-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: openmarket_dev_key
      MEILI_ENV: development
    volumes:
      - msdata:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: openmarket-minio
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web console
    environment:
      MINIO_ROOT_USER: openmarket
      MINIO_ROOT_PASSWORD: openmarket_dev
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: openmarket-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 openmarket openmarket_dev; do sleep 1; done;
      /usr/bin/mc mb -p local/openmarket-artifacts || true;
      /usr/bin/mc mb -p local/openmarket-media || true;
      /usr/bin/mc anonymous set public local/openmarket-media || true;
      echo 'MinIO buckets initialized';
      "
    restart: "no"

volumes:
  pgdata:
  msdata:
  miniodata:
